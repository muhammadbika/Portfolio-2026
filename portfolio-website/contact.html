<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Bika Alfa</title>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="contact-page">
    
    <!-- Navbar Container -->
    <div id="navbar-container"></div>

    <section class="contact section-full">
        <div class="container">
            <h1 class="section-title fade-in text-center mb-5">CONTACT</h1>
            
            <div class="contact-grid fade-in" style="animation-delay: 0.2s;">
                <!-- Contact Info -->
                <div class="contact-info">
                    <div class="info-item">
                        <i class="fa-solid fa-envelope"></i>
                        <div>
                            <h4>Email</h4>
                            <p><a href="mailto:muhamadbika@gmail.com">muhamadbika@gmail.com</a></p>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fa-solid fa-mobile-screen"></i>
                        <div>
                            <h4>Phone</h4>
                            <p>+62 895-2280-9056</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fa-solid fa-location-dot"></i>
                        <div>
                            <h4>Location</h4>
                            <p>Lampung, Indonesia<br>Bandar Lampung</p>
                        </div>
                    </div>
                </div>

                <!-- Contact Form -->
                <form class="contact-form">
                    <div class="form-group">
                        <input type="text" placeholder="Name" required>
                    </div>
                    <div class="form-group">
                        <input type="email" placeholder="Email" required>
                    </div>
                    <div class="form-group">
                        <input type="text" placeholder="Subject">
                    </div>
                    <div class="form-group">
                        <textarea placeholder="Message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-outline">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer Container -->
    <div id="footer-container"></div>

    <div class="fullscreen-icon">
        <i class="fa-solid fa-expand"></i>
    </div>

    <!-- Custom JS -->
    <script src="js/script.js"></script>
</body>
</html>
