<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Bika Alfa</title>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="portfolio-page">
    
    <!-- Navbar Container -->
    <div id="navbar-container"></div>

    <section class="portfolio section-full">
        <div class="container">
            <h1 class="section-title fade-in text-center mb-5">PORTFOLIO</h1>
            
            <div class="portfolio-grid fade-in" style="animation-delay: 0.2s;">
                <!-- Project 1 -->
                <div class="portfolio-item">
                    <img src="assets/images/project1.png" alt="Project 1" class="portfolio-img">
                    <div class="portfolio-overlay">
                        <h3>Brand Identity</h3>
                        <p>Logo & Stationery</p>
                        <a href="#" class="btn btn-outline">View Project</a>
                    </div>
                </div>
                <!-- Project 2 -->
                <div class="portfolio-item">
                    <img src="assets/images/project2.png" alt="Project 2" class="portfolio-img">
                    <div class="portfolio-overlay">
                        <h3>Web Design</h3>
                        <p>UI/UX Design</p>
                        <a href="#" class="btn btn-outline">View Project</a>
                    </div>
                </div>
                <!-- Project 3 Placeholder -->
                <div class="portfolio-item">
                    <img src="assets/images/project3.png" alt="Project 3" class="portfolio-img">
                    <div class="portfolio-overlay">
                        <h3>App Design</h3>
                        <p>Mobile Interface</p>
                        <a href="#" class="btn btn-outline">View Project</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Full screen expand icon -->
    <div class="fullscreen-icon">
        <i class="fa-solid fa-expand"></i>
    </div>

    <!-- Footer Container -->
    <div id="footer-container"></div>

    <!-- Custom JS -->
    <script src="js/script.js"></script>
</body>
</html>
